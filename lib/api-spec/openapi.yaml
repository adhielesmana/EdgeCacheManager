openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: CDN Admin API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: domains
    description: Domain management
  - name: origins
    description: Origin server management
  - name: cache
    description: Cache management
  - name: stats
    description: Statistics and analytics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      operationId: getCurrentAuthUser
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user or unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCurrentAuthUserResponse"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (superadmin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "403":
          description: Forbidden

  /users/{userId}:
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user role (superadmin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "403":
          description: Forbidden
        "404":
          description: User not found

  /mobile-auth/token-exchange:
    post:
      operationId: exchangeMobileAuthorizationCode
      tags: [auth]
      summary: Exchange mobile auth code for session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExchangeMobileAuthorizationCodeBody"
      responses:
        "200":
          description: Session token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeMobileAuthorizationCodeResponse"

  /mobile-auth/logout:
    post:
      operationId: logoutMobileSession
      tags: [auth]
      summary: Logout mobile session
      responses:
        "200":
          description: Logout result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutMobileSessionResponse"

  /domains:
    get:
      operationId: listDomains
      tags: [domains]
      summary: List all domains
      responses:
        "200":
          description: List of domains
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Domain"
    post:
      operationId: createDomain
      tags: [domains]
      summary: Add a new domain
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDomainBody"
      responses:
        "201":
          description: Domain created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Domain"
        "400":
          description: Validation error
        "403":
          description: Forbidden

  /domains/{domainId}:
    get:
      operationId: getDomain
      tags: [domains]
      summary: Get a domain by ID
      parameters:
        - name: domainId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Domain details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainWithOrigins"
        "404":
          description: Not found
    patch:
      operationId: updateDomain
      tags: [domains]
      summary: Update a domain
      parameters:
        - name: domainId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDomainBody"
      responses:
        "200":
          description: Updated domain
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Domain"
        "403":
          description: Forbidden
        "404":
          description: Not found
    delete:
      operationId: deleteDomain
      tags: [domains]
      summary: Delete a domain
      parameters:
        - name: domainId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "403":
          description: Forbidden
        "404":
          description: Not found

  /domains/{domainId}/origins:
    get:
      operationId: listOrigins
      tags: [origins]
      summary: List origin servers for a domain
      parameters:
        - name: domainId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of origin servers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Origin"
    post:
      operationId: createOrigin
      tags: [origins]
      summary: Add an origin server to a domain
      parameters:
        - name: domainId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOriginBody"
      responses:
        "201":
          description: Origin created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Origin"
        "400":
          description: Validation error
        "403":
          description: Forbidden

  /domains/{domainId}/origins/{originId}:
    patch:
      operationId: updateOrigin
      tags: [origins]
      summary: Update an origin server
      parameters:
        - name: domainId
          in: path
          required: true
          schema:
            type: integer
        - name: originId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOriginBody"
      responses:
        "200":
          description: Updated origin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Origin"
        "403":
          description: Forbidden
        "404":
          description: Not found
    delete:
      operationId: deleteOrigin
      tags: [origins]
      summary: Delete an origin server
      parameters:
        - name: domainId
          in: path
          required: true
          schema:
            type: integer
        - name: originId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "403":
          description: Forbidden
        "404":
          description: Not found

  /domains/{domainId}/cache/purge:
    post:
      operationId: purgeCache
      tags: [cache]
      summary: Purge cache for a domain
      parameters:
        - name: domainId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurgeCacheBody"
      responses:
        "200":
          description: Purge result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurgeCacheResponse"
        "403":
          description: Forbidden

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get overall CDN statistics
      responses:
        "200":
          description: CDN stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CdnStats"

  /domains/{domainId}/stats:
    get:
      operationId: getDomainStats
      tags: [stats]
      summary: Get stats for a specific domain
      parameters:
        - name: domainId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Domain stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainStats"
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AuthUser:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        profileImage:
          type: string
          nullable: true
        profileImageUrl:
          type: string
          nullable: true
        role:
          type: string
          enum: [superadmin, admin, user]
      required:
        - id
        - role

    GetCurrentAuthUserResponse:
      type: object
      properties:
        authenticated:
          type: boolean
        user:
          $ref: "#/components/schemas/AuthUser"
          nullable: true
      required:
        - authenticated

    ExchangeMobileAuthorizationCodeBody:
      type: object
      properties:
        code:
          type: string
        code_verifier:
          type: string
        redirect_uri:
          type: string
        state:
          type: string
        nonce:
          type: string
          nullable: true
      required:
        - code
        - code_verifier
        - redirect_uri
        - state

    ExchangeMobileAuthorizationCodeResponse:
      type: object
      properties:
        token:
          type: string
      required:
        - token

    LogoutMobileSessionResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    User:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        profileImage:
          type: string
          nullable: true
        role:
          type: string
          enum: [superadmin, admin, user]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - username
        - role
        - createdAt

    UpdateUserBody:
      type: object
      properties:
        role:
          type: string
          enum: [superadmin, admin, user]
      required:
        - role

    Domain:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        sslEnabled:
          type: boolean
        cacheEnabled:
          type: boolean
        cacheTtl:
          type: integer
          description: Cache TTL in seconds
        status:
          type: string
          enum: [active, inactive, provisioning]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - sslEnabled
        - cacheEnabled
        - cacheTtl
        - status
        - createdAt
        - updatedAt

    DomainWithOrigins:
      allOf:
        - $ref: "#/components/schemas/Domain"
        - type: object
          properties:
            origins:
              type: array
              items:
                $ref: "#/components/schemas/Origin"
          required:
            - origins

    CreateDomainBody:
      type: object
      properties:
        name:
          type: string
        sslEnabled:
          type: boolean
        cacheEnabled:
          type: boolean
        cacheTtl:
          type: integer
      required:
        - name

    UpdateDomainBody:
      type: object
      properties:
        name:
          type: string
        sslEnabled:
          type: boolean
        cacheEnabled:
          type: boolean
        cacheTtl:
          type: integer
        status:
          type: string
          enum: [active, inactive, provisioning]

    Origin:
      type: object
      properties:
        id:
          type: integer
        domainId:
          type: integer
        address:
          type: string
          description: IP address or hostname of the origin server
        port:
          type: integer
        protocol:
          type: string
          enum: [http, https]
        weight:
          type: integer
          description: Load balancing weight (1-100)
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - domainId
        - address
        - port
        - protocol
        - weight
        - isActive
        - createdAt

    CreateOriginBody:
      type: object
      properties:
        address:
          type: string
        port:
          type: integer
        protocol:
          type: string
          enum: [http, https]
        weight:
          type: integer
      required:
        - address

    UpdateOriginBody:
      type: object
      properties:
        address:
          type: string
        port:
          type: integer
        protocol:
          type: string
          enum: [http, https]
        weight:
          type: integer
        isActive:
          type: boolean

    PurgeCacheBody:
      type: object
      properties:
        path:
          type: string
          description: Specific path to purge, or omit to purge all

    PurgeCacheResponse:
      type: object
      properties:
        purgedCount:
          type: integer
        message:
          type: string
      required:
        - purgedCount
        - message

    CdnStats:
      type: object
      properties:
        totalDomains:
          type: integer
        totalRequests:
          type: integer
        cacheHits:
          type: integer
        cacheMisses:
          type: integer
        cacheHitRate:
          type: number
        totalBandwidth:
          type: integer
          description: Total bytes served
        activeOrigins:
          type: integer
      required:
        - totalDomains
        - totalRequests
        - cacheHits
        - cacheMisses
        - cacheHitRate
        - totalBandwidth
        - activeOrigins

    DomainStats:
      type: object
      properties:
        domainId:
          type: integer
        requests:
          type: integer
        cacheHits:
          type: integer
        cacheMisses:
          type: integer
        cacheHitRate:
          type: number
        bandwidth:
          type: integer
        cachedFiles:
          type: integer
        cacheSize:
          type: integer
          description: Cache size in bytes
      required:
        - domainId
        - requests
        - cacheHits
        - cacheMisses
        - cacheHitRate
        - bandwidth
        - cachedFiles
        - cacheSize
